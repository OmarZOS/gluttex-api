[tool:pytest]
testpaths = tests
python_paths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --import-mode=importlib
markers =
    unit: Unit tests
    integration: Integration tests  
    api: API tests
    e2e: End-to-end tests
    performance: Performance tests
    slow: Slow running tests
    staff: Staff related tests