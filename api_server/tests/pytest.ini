# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --asyncio-mode=auto
markers =
    integration: integration tests
    slow: slow running tests
    auth: authentication tests
    oauth: OAuth tests
    database: database tests
    unit: unit tests