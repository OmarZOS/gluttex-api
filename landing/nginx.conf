server {
    listen 9070;
    listen [::]:9070;
    server_name _;

    # Root directory
    root /usr/share/nginx/html;

    # Increased buffer sizes for large Flutter JS files
    client_body_buffer_size 256k;
    client_max_body_size 20m;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 16k;
    
    # Output buffers for large responses
    output_buffers 8 256k;
    postpone_output 1460;

    # TCP optimization
    tcp_nopush on;
    tcp_nodelay on;
    sendfile on;
    sendfile_max_chunk 512k;
    keepalive_timeout 65;
    keepalive_requests 100;

    # Aggressive Brotli for Flutter (before gzip fallback)
    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_min_length 1000;
    brotli_types 
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2
        font/ttf
        font/eot
        font/opentype
        application/wasm;

    # Gzip fallback (for browsers without Brotli)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_disable "msie6";
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2
        application/wasm;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ----------------------------
    # 🔹 Health Check Endpoint
    # ----------------------------
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ----------------------------
    # 🔹 Flutter Web App (/web)
    # ----------------------------
    location /web {
        alias /usr/share/nginx/html/web/;
        
        # Try serving pre-compressed brotli files first
        location ~ ^/web/(.+)$ {
            alias /usr/share/nginx/html/web/;
            try_files $1.br $1 =404;
        }

        # Service worker & manifest - NEVER cache
        location ~* ^/web/(flutter_service_worker\.js|manifest\.json|version\.json)$ {
            alias /usr/share/nginx/html/web/;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            try_files $uri =404;
        }

        # Main Dart JS - immutable with ETag
        location ~* ^/web/main\.dart\.js$ {
            alias /usr/share/nginx/html/web/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            etag on;
            # Force compression check
            add_header X-Content-Compressed "check" always;
            try_files $uri =404;
        }

        # Canvaskit (Flutter's rendering engine) - large WASM files
        location ~* ^/web/canvaskit/ {
            alias /usr/share/nginx/html/web/canvaskit/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            
            # Explicit WASM MIME type
            location ~ \.wasm$ {
                add_header Content-Type application/wasm;
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
            
            try_files $uri =404;
        }

        # WASM files (critical for performance)
        location ~* \.wasm$ {
            alias /usr/share/nginx/html/web/;
            add_header Content-Type application/wasm;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # JavaScript files (including chunks)
        location ~* \.js$ {
            alias /usr/share/nginx/html/web/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # CSS files
        location ~* \.css$ {
            alias /usr/share/nginx/html/web/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Fonts
        location ~* \.(woff2?|ttf|eot|otf)$ {
            alias /usr/share/nginx/html/web/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Images
        location ~* \.(png|jpe?g|gif|ico|svg|webp|avif)$ {
            alias /usr/share/nginx/html/web/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Assets folder (Flutter assets)
        location ~* ^/web/assets/ {
            alias /usr/share/nginx/html/web/assets/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # index.html - NEVER cache
        location = /web/ {
            alias /usr/share/nginx/html/web/;
            index index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            try_files /index.html =404;
        }

        location = /web/index.html {
            alias /usr/share/nginx/html/web/;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            try_files /index.html =404;
        }

        # Default: try file, then directory, then fallback to index.html for SPA routing
        try_files $uri $uri/ /web/index.html;
    }

    # ----------------------------
    # 🔹 Landing Page (root)
    # ----------------------------
    location / {
        index index.html;

        # Static assets with long cache
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|ico|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # HTML - no cache
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            etag on;
            try_files $uri =404;
        }

        try_files $uri $uri/ =404;
    }

    # ----------------------------
    # 🔹 Logging (more verbose for debugging)
    # ----------------------------
    access_log /var/log/nginx/gluttex_web_access.log;
    error_log /var/log/nginx/gluttex_web_error.log debug;
}