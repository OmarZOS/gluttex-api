server {
    listen 9070;
    listen [::]:9070;
    server_name _;

    # ----------------------------
    # 🔹 Landing Page (root)
    # ----------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # Basic compression for landing
        gzip on;
        gzip_types text/html text/css application/javascript;
        
        try_files $uri $uri/ =404;
    }

    # ----------------------------
    # 🔹 Flutter Web App (/web)
    # ----------------------------
    location /web/ {
        alias /usr/share/nginx/html/web/;
        index index.html;

        # ----------------------------
        # 🔹 Compression optimizations
        # ----------------------------
        gzip on;
        gzip_disable "msie6";
        gzip_comp_level 6;
        gzip_min_length 256;
        gzip_vary on;
        gzip_proxied any;
        gzip_types
            text/plain
            text/css
            application/javascript
            application/json
            image/svg+xml
            font/woff2;

        # Enable Brotli if available
        brotli on;
        brotli_static on;
        brotli_comp_level 6;
        brotli_types 
            text/plain
            text/css
            application/javascript
            application/json
            application/xml
            image/svg+xml
            font/woff
            font/woff2
            font/ttf
            font/eot;
        # ----------------------------
        # 🔹 Caching for static assets
        # ----------------------------
        location ~* \.(?:js|css|woff2?|ttf|svg|png|jpe?g|gif|ico|wasm|json)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            try_files $uri =404;
        }

        # ----------------------------
        # 🔹 HTML (index) caching
        # ----------------------------
        location = /web/index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
            try_files $uri =404;
        }

        # ----------------------------
        # 🔹 SPA fallback (Flutter routes)
        # ----------------------------
        try_files $uri $uri/ /web/index.html;

        # ----------------------------
        # 🔹 Service Worker support
        # ----------------------------
        location /web/flutter_service_worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }
    }

    # ----------------------------
    # 🔹 Security headers (global)
    # ----------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ----------------------------
    # 🔹 Logging
    # ----------------------------
    access_log /var/log/nginx/gluttex_web_access.log;
    error_log /var/log/nginx/gluttex_web_error.log warn;
}