server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html/flutter_web;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # Optional Brotli compression (if compiled in the image)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain application/javascript text/css application/json image/svg+xml font/woff2;

    # Cache static assets aggressively (hash-named files)
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Serve index.html for all routes (Flutter SPA)
    location / {
        try_files $uri /index.html;
    }

    # Optional: security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header X-XSS-Protection "1; mode=block";
}
