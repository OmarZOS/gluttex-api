<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gluttex - Gluten-Free Algeria</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="language-selector">
    <div class="background-animation"></div>
    <div class="content">
      <div class="logo">
        <img src="images/logo.png" alt="Gluttex Logo" width="120">
      </div>
      <h1>Welcome to Gluttex</h1>
      <p class="subtitle">Your gluten-free companion in Algeria</p>
      
      <div class="language-cards">
        <a href="en.html" class="language-card" data-lang="en">
          <span class="flag">🇬🇧</span>
          <span class="name">English</span>
        </a>
        <a href="fr.html" class="language-card" data-lang="fr">
          <span class="flag">🇫🇷</span>
          <span class="name">Français</span>
        </a>
        <a href="ar.html" class="language-card" data-lang="ar">
          <span class="flag">🇩🇿</span>
          <span class="name">العربية</span>
        </a>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
