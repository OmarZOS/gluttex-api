# version: '3.8'

services:

  mysql:
    image: mysql
    container_name: gluttex-db
    restart: always
    command: --max_allowed_packet=256M --init-file /data/application/init.sql

    environment:
      MYSQL_DATABASE: gluttex
      MYSQL_USER: dev_user
      MYSQL_ROOT_PASSWORD: dev_password
      MYSQL_PASSWORD: dev_password
    expose:
      - 3306
    volumes:
      - ./mysql/model.sql:/data/application/init.sql
      - ./data:/var/lib/mysql
    networks:
      - gluttex-net
  gluttex-api:
    container_name: gluttex-api
    hostname: gluttex-api
    restart: unless-stopped
    # build:
      # context: api_server/
      # args:
        # - API_PORT=9000
    image: omarzos/gluttex-api
    environment:
      - API_PORT=9000
      - SQL_SCHEMA=mysql+pymysql
      - SQL_HOST=gluttex-db
      - SQL_DATABASE=gluttex
      - SQL_USER=dev_user
      - SQL_PASSWORD=dev_password
      - SQL_PORT=3306
      - AUTH_PORT=9090
      - AUTH_SERVER_NAME=gluttex-auth
      - AUTH_REGISTRATION_ENDPOINT=/auth/users/
      - AUTH_LOGIN_ENDPOINT=${AUTH_LOGIN_ENDPOINT}
      - AUTH_DELETE_ENDPOINT = ${AUTH_DELETE_ENDPOINT
      - ALGORITHM=${ALGORITHM}
      - API_SECRET_KEY=${SECRET_KEY}
      - FILE_UPLOAD_ENDPOINT=/fs/upload
      - FS_HOST=gluttex-fs
      - FS_PORT=9099
      - API_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - API_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - API_FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - API_FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      - API_INSTAGRAM_CLIENT_ID=${INSTAGRAM_CLIENT_ID}
      - API_INSTAGRAM_CLIENT_SECRET=${INSTAGRAM_CLIENT_SECRET}
      - AUTH_CHANGE_ENDPOINT=${AUTH_CHANGE_ENDPOINT}
    networks:
      - gluttex-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    # labels:
    #   - "traefik.enable=true"
    #   # - "traefik.docker.network=gluttex-net"  # Critical fix
    #   - "traefik.http.routers.gluttex-api.rule=Host(`gluttex.com`) && PathPrefix(`/api`)"
    #   - "traefik.http.routers.gluttex-api.entrypoints=websecure"
    #   - "traefik.http.routers.gluttex-api.tls=true"
    #   - "traefik.http.routers.gluttex-api.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.gluttex-api.loadbalancer.server.port=9000"

  gluttex-auth:
    container_name: gluttex-auth
    hostname: gluttex-auth
    restart: unless-stopped
    # build:
      # context: auth_server/
      # args:
        # - AUTH_PORT=9090
    image: omarzos/gluttex-auth
    environment:
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - AUTH_PORT=9090
      - API_SECRET_KEY=${SECRET_KEY}
      - API_ALGORITHM=${ALGORITHM}
      - AUTH_DATABASE_URL=sqlite:///../auth_db/auth_db_data.db
    networks:
      - gluttex-net
    volumes:
      - ./auth_server/:/code
      - ./auth_db/:/auth_db/
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.gluttex-auth.rule=Host(`gluttex.com`) && PathPrefix(`/auth`)"
    #   - "traefik.http.routers.gluttex-auth.entrypoints=websecure"
    #   - "traefik.http.routers.gluttex-auth.tls=true"
    #   - "traefik.http.routers.gluttex-auth.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.gluttex-auth.loadbalancer.server.port=9090"

  gluttex-fs:
    container_name: gluttex-fs
    hostname: gluttex-fs
    restart: unless-stopped
    # build:
      # context: file_server/
      # args:
        # - FS_PORT=9099
    image: omarzos/gluttex-fs
    environment:
      - FS_PORT=9099
    networks:
      - gluttex-net
    volumes:
      - ./file_server/:/code
      - ./fs/:/fs/
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.gluttex-fs.rule=Host(`gluttex.com`) && PathPrefix(`/fs`)"
    #   - "traefik.http.routers.gluttex-fs.entrypoints=websecure"
    #   - "traefik.http.routers.gluttex-fs.tls=true"
    #   - "traefik.http.routers.gluttex-fs.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.gluttex-fs.loadbalancer.server.port=9099"

