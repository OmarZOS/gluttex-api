# version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: /
    networks:
      - gluttex-net
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    labels:
      - "traefik.enable=true"

      # Management UI over HTTPS
      - "traefik.http.routers.rabbitmq-ui.rule=Host(`rabbitmq.gluttex.com`)"
      - "traefik.http.routers.rabbitmq-ui.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.rabbitmq-ui.loadbalancer.server.port=15672"

      # AMQP over TLS (TCP)
      - "traefik.tcp.routers.rabbitmq-amqps.rule=HostSNI(`amqp.gluttex.com`)"
      - "traefik.tcp.routers.rabbitmq-amqps.entrypoints=amqps"
      - "traefik.tcp.routers.rabbitmq-amqps.tls.certresolver=letsencrypt"
      - "traefik.tcp.services.rabbitmq-amqps.loadbalancer.server.port=5672"



  gluttex-web:
    container_name: gluttex-web
    hostname: gluttex-web
    build:
      context: ./landing
    image: gluttex-web:latest
    restart: unless-stopped
    ports:
      - 9070:9070
    networks:
      - gluttex-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gluttex-web.rule=Host(`gluttex.com`)"
      - "traefik.http.routers.gluttex-web.entrypoints=websecure"
      - "traefik.http.routers.gluttex-web.tls=true"
      - "traefik.http.routers.gluttex-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.gluttex-web.loadbalancer.server.port=9070"

  gluttex-api:
    container_name: gluttex-api
    hostname: gluttex-api
    restart: unless-stopped
    build:
      context: api_server/
      args:
        - API_PORT=9000
    image: omarzos/gluttex-api
    environment:
      - API_PORT=9000
      - SQL_SCHEMA=${SQL_SCHEMA}
      - SQL_HOST=${SQL_HOST}
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USER=${SQL_USER}
      - SQL_PASSWORD=${SQL_ROOT_PASSWORD}
      - SQL_PORT=${SQL_PORT}
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_SERVER_NAME=${AUTH_SERVER_NAME}
      - AUTH_REGISTRATION_ENDPOINT=${AUTH_REGISTRATION_ENDPOINT}
      - AUTH_LOGIN_ENDPOINT=${AUTH_LOGIN_ENDPOINT}
      - AUTH_DELETE_ENDPOINT=${AUTH_DELETE_ENDPOINT}
      - ALGORITHM=${ALGORITHM}
      - API_SECRET_KEY=${SECRET_KEY}
      - FILE_UPLOAD_ENDPOINT=${FILE_UPLOAD_ENDPOINT}
      - FS_HOST=${FS_HOST}
      - FS_PORT=${FS_PORT}
      - API_FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - API_FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      - API_INSTAGRAM_CLIENT_ID=${INSTAGRAM_CLIENT_ID}
      - API_INSTAGRAM_CLIENT_SECRET=${INSTAGRAM_CLIENT_SECRET}
      - AUTH_CHANGE_ENDPOINT=${AUTH_CHANGE_ENDPOINT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
    networks:
      - gluttex-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    labels:
      - "traefik.enable=true"
      # - "traefik.docker.network=gluttex-net"  # Critical fix
      - "traefik.http.routers.gluttex-api.rule=Host(`gluttex.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.gluttex-api.entrypoints=websecure"
      - "traefik.http.routers.gluttex-api.tls=true"
      - "traefik.http.routers.gluttex-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.gluttex-api.loadbalancer.server.port=9000"

  gluttex-auth:
    container_name: gluttex-auth
    hostname: gluttex-auth
    restart: unless-stopped
    build:
      context: auth_server/
      args:
        - AUTH_PORT=9090
    image: omarzos/gluttex-auth
    environment:
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - AUTH_PORT=9090
      - API_SECRET_KEY=${SECRET_KEY}
      - API_ALGORITHM=${ALGORITHM}
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL}
    networks:
      - gluttex-net
    volumes:
      - ./auth_server/:/code
      - ./auth_db/:/auth_db/
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gluttex-auth.rule=Host(`gluttex.com`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.gluttex-auth.entrypoints=websecure"
      - "traefik.http.routers.gluttex-auth.tls=true"
      - "traefik.http.routers.gluttex-auth.tls.certresolver=letsencrypt"
      - "traefik.http.services.gluttex-auth.loadbalancer.server.port=9090"

  gluttex-fs:
    container_name: gluttex-fs
    hostname: gluttex-fs
    restart: unless-stopped
    build:
      context: file_server/
      args:
        - FS_PORT=9099
    image: omarzos/gluttex-fs
    environment:
      - FS_PORT=9099
    networks:
      - gluttex-net
    volumes:
      - ./file_server/:/code
      - ./fs/:/fs/
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gluttex-fs.rule=Host(`gluttex.com`) && PathPrefix(`/fs`)"
      - "traefik.http.routers.gluttex-fs.entrypoints=websecure"
      - "traefik.http.routers.gluttex-fs.tls=true"
      - "traefik.http.routers.gluttex-fs.tls.certresolver=letsencrypt"
      - "traefik.http.services.gluttex-fs.loadbalancer.server.port=9099"

  gluttex-stream:
    container_name: gluttex-stream
    hostname: gluttex-stream
    restart: unless-stopped
    build:
      context: ./stream_server
      dockerfile: ./Dockerfile
    command: uvicorn server:app --host 0.0.0.0 --port 9097 --reload
    image: omarzos/gluttex-stream
    ports:
      - 9097:9097
    volumes:
      - ./stream_server/:/code
    networks:
      - gluttex-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.amqps.address=:5671"

      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # API Dashboard
      - "--api.insecure=true"

      # Let's Encrypt DNS challenge
      - "--certificatesresolvers.letsencrypt.acme.email=admin@gluttex.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=20"

    environment:
      - "CF_API_TOKEN=${CLOUDFLARE_API_TOKEN}"  # Cloudflare API token
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "5671:5671"  # AMQPS
    networks:
      - gluttex-net
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"


volumes:
  rabbitmq_data:
    driver: local
  rabbitmq_logs:
    driver: local

networks:
  gluttex-net:
    name: gluttex-net
    driver: bridge
    attachable: true