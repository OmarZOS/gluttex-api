name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main  # Runs the workflow when pushing to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api_server/Dockerfile  # Path to your Dockerfile
          push: true
          tags: omarzos/gluttex-api:latest

      - name: Build and Push Auth Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./auth_server/Dockerfile  # Path to your Dockerfile
          push: true
          tags: omarzos/gluttex-auth:latest
