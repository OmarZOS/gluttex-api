name: Deploy Gluttex Stack

on:
  push:
    branches:
      - main  # Only deploy on main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: dev_password
          MYSQL_DATABASE: gluttex
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -pdev_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build your images (auth, fs, api, etc.)
      - name: Build Docker images
        run: |
          docker build -t gluttex-auth ./auth_server
          docker build -t gluttex-fs ./file_server
          docker build -t gluttex-api ./api_server
          docker build -t gluttex-stream ./stream_server
      
      # Start containers with docker-compose (auth, fs, api)
      - name: Start containers
        run: |
          docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d
          sleep 30  # give services time to start
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build & push API
      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./api_server
          push: true
          tags: omarzos/gluttex-api:latest

      # Build & push Auth
      - name: Build and Push Auth Image
        uses: docker/build-push-action@v5
        with:
          context: ./auth_server
          push: true
          tags: omarzos/gluttex-auth:latest

      # Build & push File Server
      - name: Build and Push FS Image
        uses: docker/build-push-action@v5
        with:
          context: ./file_server
          push: true
          tags: omarzos/gluttex-fs:latest
      # Build & push streaming Server
      - name: Build and Push Stream Image
        uses: docker/build-push-action@v5
        with:
          context: ./stream_server
          push: true
          tags: omarzos/gluttex-stream:latest

        

