name: Deploy Gluttex Stack

on:
  push:
    branches:
      - main  # Only deploy on main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: dev_password
          MYSQL_DATABASE: gluttex
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -pdev_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Images
        uses: docker/build-push-action@v5
        with:
          push: true
          cache-from: type=registry,ref=omarzos/gluttex-api:latest
          cache-to: type=inline
          platforms: linux/amd64,linux/arm64
          # Build multiple images in one step using matrix-style approach
          build-args: |
            AUTH_CONTEXT=./auth_server
            API_CONTEXT=./api_server
            FS_CONTEXT=./file_server
          tags: |
            omarzos/gluttex-auth:latest
            omarzos/gluttex-api:latest
            omarzos/gluttex-fs:latest

      - name: Start containers
        run: |
          docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d
          sleep 30  # allow services to start

      # Optional: deploy to Droplet
