version: '3.8'
services:
  # mysql:
    # image: mysql
    # container_name: gluttex-db
    # restart: always
    # command: --max_allowed_packet=256M --init-file /data/application/init.sql
    # environment:
    #   MYSQL_DATABASE: ${MYSQL_DATABASE}
    #   MYSQL_USER: ${MYSQL_USER}
    #   MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    #   MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # ports:
    #   - ${MYSQL_PORT}:3306
    # volumes:
    #   - ./mysql/model.sql:/data/application/init.sql
    #   - ./data:/var/lib/mysql
    # networks:
    #   - gluttex-net

  gluttex-api:
    container_name: gluttex-api
    hostname: gluttex-api
    restart: always
    build: api_server/.
    image: omarzos/gluttex-api
    environment:
      - API_PORT=${API_PORT}
      - SQL_SCHEMA=${SQL_SCHEMA}
      - SQL_HOST=${SQL_HOST}
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USER=${SQL_USER}
      - SQL_PASSWORD=${SQL_ROOT_PASSWORD}
      - SQL_PORT=${SQL_PORT}
      - API_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - API_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - API_FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - API_FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      - API_INSTAGRAM_CLIENT_ID=${INSTAGRAM_CLIENT_ID}
      - API_INSTAGRAM_CLIENT_SECRET=${INSTAGRAM_CLIENT_SECRET}
      - API_SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - AUTH_SERVER_NAME=${AUTH_SERVER_NAME}
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_REGISTRATION_ENDPOINT=${AUTH_REGISTRATION_ENDPOINT}
      - AUTH_LOGIN_ENDPOINT=${AUTH_LOGIN_ENDPOINT}
      - AUTH_CHANGE_ENDPOINT=${AUTH_CHANGE_ENDPOINT}
    networks:
      - gluttex-net
    ports:
      - ${API_PORT}
    volumes:
      - ./api_server/:/code
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gluttex-api.rule=Host(`gluttex.com`) && PathPrefix(`/`) || Host(`134.199.240.34`) "
      - "traefik.http.services.gluttex-api.loadbalancer.server.port=9000"
    # expose:
    #   - 8000  # Exposes the API to Traefik internally

  gluttex-auth:
    container_name: gluttex-auth
    hostname: gluttex-auth
    restart: always
    build: auth_server/.
    image: omarzos/gluttex-auth
    ports:
      - ${AUTH_PORT}
    environment:
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - AUTH_PORT=${AUTH_PORT}
      - API_SECRET_KEY=${SECRET_KEY}
      - API_ALGORITHM=${ALGORITHM}
    networks:
      - gluttex-net
    volumes:
      - ./auth_server/:/code
      - ./auth_server/auth_db/auth_db.db:/auth_db_data.db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gluttex-auth.rule=Host(`gluttex.com`) && PathPrefix(`/`) || Host(`134.199.240.34`) "
      - "traefik.http.services.gluttex-auth.loadbalancer.server.port=9090"

  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"  # HTTP
      - "8080:8080"  # Traefik dashboard
    networks:
      - gluttex-net
    labels:
      - "traefik.enable=true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"  # 🔥 Important! 

  # prometheus:
  #   image: prom/prometheus
  #   container_name: prometheus
  #   restart: always
  #   ports:
  #     - ${MONITOR_PORT}:9090
  #   volumes:
  #     - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - gluttex-net

volumes:
  data:
  auth_db:

networks:
  gluttex-net:
    name: gluttex-net
    driver: bridge
