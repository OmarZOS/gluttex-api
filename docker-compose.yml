version: '3'
services:
  mysql:
    image: mysql
    container_name: gluttex-db
    restart: always
    command: --init-file /data/application/init.sql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - ${MYSQL_PORT}:3306
    volumes:
        - ./mysql/model.sql:/data/application/init.sql
        - ./data:/var/lib/mysql
        # - ./mysql/my.cnf:/etc/mysql/my.cnf  # Mount custom my.cnf
    networks:
      - gluttex-net
  gluttex-api:
    container_name: gluttex-api
    hostname: gluttex-api
    restart: always
    build:  server/.
    image: omarzos/gluttex-api
    ports:
      - ${API_PORT}:8000
    environment:
      - SQL_SCHEMA=${MYSQL_SCHEMA}
      - SQL_HOST=${MYSQL_HOST}
      - SQL_DATABASE=${MYSQL_DATABASE}
      - SQL_USER=${MYSQL_USER}
      - SQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
    networks:
      - gluttex-net
    volumes:
      - ./server/:/code
volumes:
  data:
networks:
  gluttex-net:
    name: gluttex-net
    driver: bridge